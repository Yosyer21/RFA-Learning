<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | RFA.Learning</title>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>
  <a href="#register-form" class="skip-link" data-i18n="skip.form">Ir al formulario</a>
  <header class="topbar topbar-landing">
    <div class="topbar-brand">
      <span class="brand-icon"></span>
      <h1>RFA<span class="brand-dot">.</span>Learning</h1>
    </div>
    <nav>
      <a href="/" data-i18n="nav.inicio">Inicio</a>
      <a href="/login" data-i18n="nav.login">Iniciar sesión</a>
    </nav>
  </header>

  <main class="container auth-page">
    <form id="register-form" class="card form login-card">
      <div class="login-header">
        <span class="kicker" data-i18n="register.kicker">Cuenta nueva</span>
        <h1 data-i18n="register.title">Crear cuenta</h1>
      </div>

      <label for="name" data-i18n="register.name">Nombre completo</label>
      <input id="name" name="name" placeholder="Tu nombre" data-i18n-placeholder="register.namePlaceholder" required aria-required="true">
      <div class="field-error" aria-live="polite"></div>

      <label for="username" data-i18n="register.username">Usuario</label>
      <input id="username" name="username" placeholder="Tu nombre de usuario" data-i18n-placeholder="register.usernamePlaceholder" minlength="3" required aria-required="true">
      <div class="field-error" aria-live="polite"></div>

      <label for="password" data-i18n="register.password">Contraseña</label>
      <input id="password" name="password" type="password" placeholder="Mín. 8 caracteres, mayúscula, minúscula y número" data-i18n-placeholder="register.passwordPlaceholder" minlength="8" required aria-required="true">
      <div id="password-strength-container"></div>
      <div class="field-error" aria-live="polite"></div>

      <button type="submit" class="btn btn-primary" data-i18n="register.submit">Registrarse</button>
      <p class="hint" style="margin-top:0.8rem; text-align:center;">
        <span data-i18n="register.hasAccount">¿Ya tienes cuenta?</span> <a href="/login" data-i18n="register.loginLink">Inicia sesión</a>
      </p>
    </form>
  </main>
  <script src="../js/i18n.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
