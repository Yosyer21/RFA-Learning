<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | RFA.Learning</title>
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>
  <a href="#register-form" class="skip-link">Ir al formulario</a>
  <header class="topbar topbar-landing">
    <div class="topbar-brand">
      <span class="brand-icon"></span>
      <h1>RFA<span class="brand-dot">.</span>Learning</h1>
    </div>
    <nav>
      <a href="/">Inicio</a>
      <a href="/login">Iniciar sesión</a>
      <button class="btn btn-small btn-ghost" data-theme-toggle type="button">Modo claro</button>
    </nav>
  </header>

  <main class="container auth-page">
    <form id="register-form" class="card form login-card">
      <div class="login-header">
        <span class="kicker">Cuenta nueva</span>
        <h1>Crear cuenta</h1>
      </div>

      <label for="name">Nombre completo</label>
      <input id="name" name="name" placeholder="Tu nombre" required aria-required="true">
      <div class="field-error" aria-live="polite"></div>

      <label for="username">Usuario</label>
      <input id="username" name="username" placeholder="Tu nombre de usuario" minlength="3" required aria-required="true">
      <div class="field-error" aria-live="polite"></div>

      <label for="password">Contraseña</label>
      <input id="password" name="password" type="password" placeholder="Mín. 8 caracteres, mayúscula, minúscula y número" minlength="8" required aria-required="true">
      <div id="password-strength-container"></div>
      <div class="field-error" aria-live="polite"></div>

      <button type="submit" class="btn btn-primary">Registrarse</button>
      <p class="hint" style="margin-top:0.8rem; text-align:center;">
        ¿Ya tienes cuenta? <a href="/login">Inicia sesión</a>
      </p>
    </form>
  </main>
  <script src="../js/theme.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
