<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contrasena | RFA.Learning</title>
  <link rel="stylesheet" href="../css/change-password.css">
  <link rel="stylesheet" href="../css/shared.css">
</head>
<body>
  <a href="#change-password-form" class="skip-link" data-i18n="skip.form">Ir al formulario</a>
  <header class="topbar topbar-landing">
    <div class="topbar-brand">
      <span class="brand-icon"></span>
      <h1>RFA<span class="brand-dot">.</span>Learning</h1>
    </div>
    <nav>
    </nav>
  </header>

  <main class="container auth-page">
    <form id="change-password-form" class="card cp-card form">
      <div class="cp-header">
        <span class="kicker" data-i18n="cp.kicker">Seguridad</span>
        <h1 data-i18n="cp.title">Cambio obligatorio de contrasena</h1>
        <p class="hint" data-i18n="cp.hint">Debes actualizar la contrasena temporal para continuar.</p>
      </div>

      <label for="currentPassword" data-i18n="cp.current">Contrasena actual</label>
      <input id="currentPassword" name="currentPassword" type="password" required>

      <label for="newPassword" data-i18n="cp.new">Nueva contraseña</label>
      <input id="newPassword" name="newPassword" type="password" minlength="8" required aria-required="true">
      <div id="password-strength-container"></div>

      <button type="submit" class="btn btn-primary" data-i18n="cp.submit">Actualizar</button>
      <p id="message" class="message"></p>
    </form>
  </main>
  <script src="../js/i18n.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/change-password.js"></script>
</body>
</html>
