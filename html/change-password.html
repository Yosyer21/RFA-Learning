<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambiar Contrasena | RFA.Learning</title>
  <link rel="stylesheet" href="../css/change-password.css">
</head>
<body>
  <header class="topbar topbar-landing">
    <div class="topbar-brand">
      <span class="brand-icon"></span>
      <h1>RFA<span class="brand-dot">.</span>Learning</h1>
    </div>
    <nav>
      <button class="btn btn-small btn-ghost" data-theme-toggle type="button">Modo claro</button>
    </nav>
  </header>

  <main class="container auth-page">
    <form id="change-password-form" class="card cp-card form">
      <div class="cp-header">
        <span class="kicker">Seguridad</span>
        <h1>Cambio obligatorio de contrasena</h1>
        <p class="hint">Debes actualizar la contrasena temporal para continuar.</p>
      </div>

      <label for="currentPassword">Contrasena actual</label>
      <input id="currentPassword" name="currentPassword" type="password" required>

      <label for="newPassword">Nueva contrasena</label>
      <input id="newPassword" name="newPassword" type="password" minlength="8" required>

      <button type="submit" class="btn btn-primary">Actualizar</button>
      <p id="message" class="message"></p>
    </form>
  </main>
  <script src="../js/theme.js"></script>
  <script src="../js/change-password.js"></script>
</body>
</html>
