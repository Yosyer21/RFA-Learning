<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RFA.Learning</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <header class="topbar topbar-landing">
    <div class="topbar-brand">
      <span class="brand-icon"></span>
      <h1>RFA<span class="brand-dot">.</span>Learning</h1>
    </div>
    <nav>
      <a href="/">Inicio</a>
      <button class="btn btn-small btn-ghost" data-theme-toggle type="button">Modo claro</button>
    </nav>
  </header>

  <main class="container auth-page">
    <form id="login-form" class="card form login-card">
      <div class="login-header">
        <span class="kicker">Acceso</span>
        <h1>Iniciar sesion</h1>
      </div>
      <label for="username">Usuario</label>
      <input id="username" name="username" placeholder="Tu nombre de usuario" required>

      <label for="password">Contrasena</label>
      <input id="password" name="password" type="password" placeholder="Tu contrasena" required>

      <button type="submit" class="btn btn-primary">Entrar</button>
      <p id="error" class="message error"></p>
      <p class="hint">Admin inicial: admin / Admin1234</p>
    </form>
  </main>
  <script src="../js/theme.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
